<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Formulir Penambahan Paket Belajar CoLearn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:16px;
border-radius:12px;
margin-bottom:16px;
}

select,input,textarea,button{
width:100%;
padding:10px;
margin-top:8px;
}

button{
background:#2563eb;
color:white;
border:none;
border-radius:8px;
}

button:disabled{
background:#cbd5e1;
}

.slot{
border:1px solid #eee;
padding:10px;
border-radius:8px;
margin-top:8px;
}

</style>

</head>

<body>

<div style="text-align:center;margin-bottom:20px">
<img src="CoLearn Logo Blue.png" style="height:40px">
</div>

<h2 style="text-align:center">
Formulir Penambahan Paket Belajar CoLearn
</h2>

<div class="card">

<b>Masukkan nomor murid yang terdaftar di CoLearn</b>

<input id="lookupPhone" placeholder="Nomor yang terdaftar">

<button id="lookupBtn" onclick="lookupStudent()">
Cek Data Murid
</button>

</div>

<div class="card" id="studentInfo" style="display:none">

<b>Data murid ditemukan</b>

<div id="studentName"></div>
<div id="studentGrade"></div>
<div id="studentTenure"></div>

</div>

<div class="card">

<b>Pilih kelas</b>

<select id="kelas">

<option value="">Pilih kelas</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>

</select>

</div>

<div class="card" id="upgradeSection" style="display:none">

<b>Penambahan yang ingin dilakukan</b>

<label>
<input type="checkbox" id="checkIPA">
IPA (1x/Minggu)
</label>

<label>
<input type="checkbox" id="checkFisika">
Fisika (1x/Minggu)
</label>

<label>
<input type="checkbox" id="checkKimia">
Kimia (1x/Minggu)
</label>

<label>
<input type="checkbox" id="checkMTK">
Frekuensi Matematika (2x/Minggu)
</label>

<button id="lihatBtn" onclick="lihatUpgrade()">
Lihat harga dan jadwal
</button>

</div>

<div id="priceBox" class="card" style="display:none"></div>

<div id="schedule" class="card" style="display:none"></div>

<div id="materiBox" class="card" style="display:none"></div>

<script>

let kelas=""
let studentTenure=""

const semesterEndMap={
"7":"2026-06-14",
"8":"2026-06-14",
"9":"2026-05-03",
"10":"2026-06-14",
"11":"2026-06-14"
}

const GAS_LOOKUP="https://script.google.com/macros/s/AKfycbwyD-MHGQfSzcAQ39tOi-Y8jHfSrTdHaiNdw8pxzCEMJtdwojNcoSvmiRscLTatmmkP/exec"

document.getElementById("kelas").onchange=function(){

kelas=this.value

if(!kelas)return

document.getElementById("upgradeSection").style.display="block"

}

async function lookupStudent(){

const phone=document.getElementById("lookupPhone").value.trim()

if(!phone){

alert("Masukkan nomor terlebih dahulu")
return

}

const btn=document.getElementById("lookupBtn")

btn.disabled=true
btn.innerText="Mengecek..."

try{

const res=await fetch(`${GAS_LOOKUP}?type=studentLookup&phone=${phone}`)
const data=await res.json()

if(!data.found){

alert("Nomor tidak ditemukan")

btn.disabled=false
btn.innerText="Cek Data Murid"

return

}

document.getElementById("studentInfo").style.display="block"

document.getElementById("studentName").innerText="Nama: "+data.name
document.getElementById("studentGrade").innerText="Kelas: "+data.grade
document.getElementById("studentTenure").innerText="Pembayaran: "+data.tenure

studentTenure=data.tenure
kelas=String(data.grade)

document.getElementById("kelas").value=kelas
document.getElementById("upgradeSection").style.display="block"

btn.innerText="Data ditemukan"

}catch{

alert("Gagal mengambil data")

btn.disabled=false
btn.innerText="Cek Data Murid"

}

}

function getUpgradePrice(){

let price=0

if(["7","8","9"].includes(kelas)) price+=49000

if(document.getElementById("checkIPA").checked) price+=49000

if(document.getElementById("checkFisika").checked && document.getElementById("checkKimia").checked){

price+=79000

}else{

if(document.getElementById("checkFisika").checked) price+=49000
if(document.getElementById("checkKimia").checked) price+=49000

}

if(document.getElementById("checkMTK").checked) price+=25000

return price

}

function lihatUpgrade(){

const price=getUpgradePrice()

if(price===0){

alert("Pilih penambahan terlebih dahulu")
return

}

const priceBox=document.getElementById("priceBox")

priceBox.style.display="block"

if(studentTenure==="monthly"){

priceBox.innerHTML=

`Biaya penambahan: <b>Rp ${price.toLocaleString()}</b>

<div style="margin-top:8px;color:#666">

Total per bulan: biaya per bulan saat ini + penambahan

</div>`

}else{

priceBox.innerHTML=

`Biaya upgrade hingga akhir semester:

<b>Rp ${price.toLocaleString()}</b>

<div style="margin-top:6px;color:#666">

Harga dihitung hingga akhir semester (${semesterEndMap[kelas]})

</div>`

}

}

</script>

</body>
</html>
